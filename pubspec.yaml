name: ovumate
description: A secure and beginner-friendly mobile application designed to help women track their menstrual cycles and improve wellness.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Backend & Database
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.2
  
  # Timezone utilities for notifications
  flutter_native_timezone: ^2.0.0
  
  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.0.9
  
  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0
  
  # Security & Encryption
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  
  # Chat & AI
  flutter_chat_ui: ^1.6.10
  
  # Image & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Utils
  uuid: ^4.2.1
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.1
  url_launcher: ^6.2.4
  share_plus: ^10.0.2
  
  # Typography
  google_fonts: ^6.1.0
  
  # Localization
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.5
  
  # PDF Generation
  pdf: ^3.10.7
  # printing: ^5.12.0  # Temporarily disabled due to Windows build issues
  path_provider: ^2.1.1
  
  # Contact Selection
  flutter_contacts: ^1.1.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    - assets/translations/
    - assets/translations/en.json
    - assets/translations/ta.json
    - assets/translations/si.json
  
  # Fonts section removed - Poppins fonts not available
  # Add fonts back when you have the actual font files

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#E55A8A"
    theme_color: "#E55A8A"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 256  # Windows icon size
  image_path: "assets/images/app_icon.png"  # Your app icon image (1024x1024px recommended)
  # Optional: Generate adaptive icons for Android
  adaptive_icon_background: "#E55A8A"  # Background color for adaptive icon (your brand color)
  adaptive_icon_foreground: "assets/images/app_icon.png"
  # Optional: Remove old launcher icons before generating new ones
  remove_alpha_ios: true

